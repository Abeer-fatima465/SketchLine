<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <!-- Hamburger menu -->
    <div class="dash-hamburger">
        <button class="dash-hamburger__btn" aria-label="Toggle menu" aria-expanded="false">
            <span class="dash-hamburger__line"></span>
            <span class="dash-hamburger__line"></span>
            <span class="dash-hamburger__line"></span>
        </button>
        <nav class="dash-hamburger__menu" aria-label="Quick navigation">
            <a class="dash-hamburger__item" href="#">Discover</a>
            <a class="dash-hamburger__item" href="#">Home</a>
            <a class="dash-hamburger__item" href="#">Search</a>
            <a class="dash-hamburger__item dash-hamburger__item--logout" href="/logout">Logout</a>
        </nav>
    </div>

    <!-- Decorative polaroid strip background -->
    <div class="image-container">
        <div class="polaroid-strip polaroid-strip--left" aria-hidden="true">
            <div class="polaroid-frame">
                <div class="polaroid-frame__photo" style="background-image: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80');"></div>
            </div>
            <div class="polaroid-frame">
                <div class="polaroid-frame__photo" style="background-image: url('https://images.unsplash.com/photo-1493246507139-91e8fad9978e?auto=format&fit=crop&w=900&q=80');"></div>
            </div>
            <div class="polaroid-frame">
                <div class="polaroid-frame__photo" style="background-image: url('https://images.unsplash.com/photo-1516483638261-f4dbaf036963?auto=format&fit=crop&w=900&q=80');"></div>
            </div>
        </div>
        <div class="polaroid-strip polaroid-strip--center" aria-hidden="true">
            <div class="polaroid-frame">
                <div class="polaroid-frame__photo" style="background-image: url('https://images.unsplash.com/photo-1504198453319-5ce911bafcde?auto=format&fit=crop&w=900&q=80');"></div>
            </div>
            <div class="polaroid-frame">
                <div class="polaroid-frame__photo" style="background-image: url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=900&q=80');"></div>
            </div>
            <div class="polaroid-frame">
                <div class="polaroid-frame__photo" style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=900&q=80');"></div>
            </div>
            <div class="polaroid-frame">
                <div class="polaroid-frame__photo" style="background-image: url('https://images.unsplash.com/photo-1491553895911-0055eca6402d?auto=format&fit=crop&w=900&q=80');"></div>
            </div>
        </div>
        <div class="polaroid-strip polaroid-strip--right" aria-hidden="true">
            <div class="polaroid-frame">
                <div class="polaroid-frame__photo" style="background-image: url('https://images.unsplash.com/photo-1500534623283-312aade485b7?auto=format&fit=crop&w=900&q=80');"></div>
            </div>
            <div class="polaroid-frame">
                <div class="polaroid-frame__photo" style="background-image: url('https://images.unsplash.com/photo-1504893524553-b855bce32c67?auto=format&fit=crop&w=900&q=80');"></div>
            </div>
            <div class="polaroid-frame">
                <div class="polaroid-frame__photo" style="background-image: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=900&q=80');"></div>
            </div>
        </div>
    </div>

    <!-- Dashboard body -->
    <div class="dashboard profile-dashboard">
        <main class="main profile-main">
            <!-- JS injects profile card here -->
            <div id="profile-root"></div>

            <!-- JS injects albums + add button here -->
            <section id="albums-root"></section>
        </main>
    </div>

    <div class="album-modal" id="album-modal" aria-hidden="true">
        <div class="album-modal__backdrop"></div>
        <div class="album-modal__dialog glass-container" role="dialog" aria-modal="true" aria-labelledby="album-modal-title">
            <button class="album-modal__close" type="button" aria-label="Close album form">
                ×
            </button>
            <h2 class="album-modal__title" id="album-modal-title">Create Album</h2>
            <p class="album-modal__subtitle">Add a name and description for your new album.</p>
            <form class="album-form" id="album-form">
                <label class="album-form__field">
                    <span>Album Name</span>
                    <input class="album-form__input" id="album-name-input" name="title" type="text" maxlength="50" placeholder="Album 4" required>
                </label>
                <label class="album-form__field">
                    <span>Description</span>
                    <textarea class="album-form__input album-form__textarea" id="album-description-input" name="subtitle" rows="3" maxlength="120" placeholder="Generic album"></textarea>
                </label>
                <div class="album-form__actions">
                    <button class="album-form__cancel" type="button">Cancel</button>
                    <button class="album-form__submit" type="submit">Create</button>
                </div>
            </form>
        </div>
    </div>

    <div class="album-view-modal" id="album-view-modal" aria-hidden="true">
        <div class="album-view-modal__backdrop"></div>
        <div class="album-view-modal__dialog glass-container" role="dialog" aria-modal="true" aria-labelledby="album-view-title">
            <button class="album-view-modal__close" type="button" aria-label="Close album view">
                ×
            </button>
            <p class="album-view-modal__eyebrow">Album Preview</p>
            <h2 class="album-view-modal__title" id="album-view-title"></h2>
            <p class="album-view-modal__description" id="album-view-description"></p>
            <div class="album-view-modal__actions">
                <label class="album-view-modal__upload" for="album-photo-input">Add Photos</label>
                <input class="album-view-modal__file-input" id="album-photo-input" type="file" accept="image/*" multiple>
                <button class="album-view-modal__save" id="album-save-btn" type="button">Save</button>
            </div>
            <div class="album-view-modal__content">
                <div class="album-view-modal__gallery" id="album-photo-gallery"></div>
            </div>
        </div>
    </div>

    <div class="photo-viewer-modal" id="photo-viewer-modal" aria-hidden="true">
        <div class="photo-viewer-modal__backdrop"></div>
        <div class="photo-viewer-modal__dialog glass-container" role="dialog" aria-modal="true" aria-labelledby="photo-viewer-title">
            <button class="photo-viewer-modal__close" type="button" aria-label="Close photo viewer">
                ×
            </button>
            <button class="photo-viewer-modal__nav photo-viewer-modal__nav--prev" type="button" aria-label="Previous photo">
                &#8249;
            </button>
            <div class="photo-viewer-modal__frame">
                <img class="photo-viewer-modal__image" id="photo-viewer-image" alt="">
                <p class="photo-viewer-modal__caption" id="photo-viewer-title"></p>
            </div>
            <button class="photo-viewer-modal__nav photo-viewer-modal__nav--next" type="button" aria-label="Next photo">
                &#8250;
            </button>
        </div>
    </div>

    <div class="delete-confirm-modal" id="delete-confirm-modal" aria-hidden="true">
        <div class="delete-confirm-modal__backdrop"></div>
        <div class="delete-confirm-modal__dialog glass-container" role="dialog" aria-modal="true" aria-labelledby="delete-confirm-title">
            <button class="delete-confirm-modal__close" type="button" aria-label="Close delete warning">
                ×
            </button>
            <p class="delete-confirm-modal__eyebrow">Warning</p>
            <h2 class="delete-confirm-modal__title" id="delete-confirm-title">Delete selected album?</h2>
            <p class="delete-confirm-modal__description" id="delete-confirm-description">
                This action cannot be undone.
            </p>
            <div class="delete-confirm-modal__actions">
                <button class="delete-confirm-modal__cancel" type="button">Cancel</button>
                <button class="delete-confirm-modal__confirm" type="button">Delete</button>
            </div>
        </div>
    </div>

    <script>
        /************* DASHBOARD INTERACTIONS *************/
        document.addEventListener('DOMContentLoaded', () => {
            /************* HAMBURGER MENU *************/
            const hamburgerBtn = document.querySelector('.dash-hamburger__btn');
            const hamburgerMenu = document.querySelector('.dash-hamburger__menu');

            if (hamburgerBtn && hamburgerMenu) {
                const toggleMenu = () => {
                    const isOpen = hamburgerMenu.classList.toggle('active');
                    hamburgerBtn.classList.toggle('active', isOpen);
                    hamburgerBtn.setAttribute('aria-expanded', String(isOpen));
                };

                hamburgerBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleMenu();
                });

                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.dash-hamburger')) {
                        hamburgerMenu.classList.remove('active');
                        hamburgerBtn.classList.remove('active');
                        hamburgerBtn.setAttribute('aria-expanded', 'false');
                    }
                });
            }

            /************* DYNAMIC PROFILE + ALBUMS *************/
            const profileData = {
                initials: 'JD',
                name: 'Jane Doe',
                phone: '555-123-4567',
                email: 'janedoe@janedoe.com',
                photo: null,
                bio: 'Photographer, traveler, and visual storyteller collecting moments one frame at a time.'
            };

            let albums = [
                { id: 1, title: 'Album 1', subtitle: 'Generic album', photos: [] },
                { id: 2, title: 'Album 2', subtitle: 'Generic album', photos: [] },
                { id: 3, title: 'Album 3', subtitle: 'Generic album', photos: [] }
            ];
            let selectedAlbumIds = new Set();
            let isDeleteMode = false;
            let currentAlbumId = null;
            let pendingDeleteAlbumId = null;
            let currentPhotoIndex = 0;
            let isEditingProfileDetails = false;

            const profileRoot = document.getElementById('profile-root');
            const albumsRoot = document.getElementById('albums-root');
            const albumModal = document.getElementById('album-modal');
            const albumForm = document.getElementById('album-form');
            const albumNameInput = document.getElementById('album-name-input');
            const albumDescriptionInput = document.getElementById('album-description-input');
            const albumModalCloseBtn = albumModal.querySelector('.album-modal__close');
            const albumModalCancelBtn = albumModal.querySelector('.album-form__cancel');
            const albumViewModal = document.getElementById('album-view-modal');
            const albumViewTitle = document.getElementById('album-view-title');
            const albumViewDescription = document.getElementById('album-view-description');
            const albumViewCloseBtn = albumViewModal.querySelector('.album-view-modal__close');
            const albumPhotoInput = document.getElementById('album-photo-input');
            const albumPhotoGallery = document.getElementById('album-photo-gallery');
            const albumSaveBtn = document.getElementById('album-save-btn');
            const photoViewerModal = document.getElementById('photo-viewer-modal');
            const photoViewerImage = document.getElementById('photo-viewer-image');
            const photoViewerTitle = document.getElementById('photo-viewer-title');
            const photoViewerCloseBtn = photoViewerModal.querySelector('.photo-viewer-modal__close');
            const photoViewerPrevBtn = photoViewerModal.querySelector('.photo-viewer-modal__nav--prev');
            const photoViewerNextBtn = photoViewerModal.querySelector('.photo-viewer-modal__nav--next');
            const deleteConfirmModal = document.getElementById('delete-confirm-modal');
            const deleteConfirmDescription = document.getElementById('delete-confirm-description');
            const deleteConfirmCloseBtn = deleteConfirmModal.querySelector('.delete-confirm-modal__close');
            const deleteConfirmCancelBtn = deleteConfirmModal.querySelector('.delete-confirm-modal__cancel');
            const deleteConfirmSubmitBtn = deleteConfirmModal.querySelector('.delete-confirm-modal__confirm');

            function escapeHTML(value) {
                return String(value)
                    .replaceAll('&', '&amp;')
                    .replaceAll('<', '&lt;')
                    .replaceAll('>', '&gt;')
                    .replaceAll('"', '&quot;')
                    .replaceAll("'", '&#39;');
            }

            function getInitials(name) {
                const parts = String(name)
                    .trim()
                    .split(/\s+/)
                    .filter(Boolean)
                    .slice(0, 2);

                if (!parts.length) {
                    return 'JD';
                }

                return parts.map(part => part.charAt(0).toUpperCase()).join('');
            }

            function renderProfile() {
                const safeName = escapeHTML(profileData.name);
                const safePhone = escapeHTML(profileData.phone);
                const safeEmail = escapeHTML(profileData.email);
                const safeBio = escapeHTML(profileData.bio);
                const safeInitials = escapeHTML(profileData.initials);

                profileRoot.innerHTML = `
                    <div class="profile-card glass-container">
                        <div class="profile-avatar-wrap">
                            <div class="profile-avatar">
                                ${profileData.photo
                                    ? `<img class="profile-avatar__image" src="${profileData.photo}" alt="${safeName} profile photo">`
                                    : safeInitials}
                                <label class="profile-avatar__upload" for="profile-photo-input" aria-label="Upload profile photo" title="Upload profile photo">
                                    &#9998;
                                </label>
                            </div>
                            <input class="profile-avatar__input" id="profile-photo-input" type="file" accept="image/*">
                        </div>
                        <div class="profile-details-card">
                            <div class="profile-details__header">
                                <span class="profile-details__label">Profile</span>
                                ${isEditingProfileDetails
                                    ? ''
                                    : `
                                        <button class="profile-details__edit" type="button" aria-label="Edit profile details" title="Edit profile details">
                                            &#9998;
                                        </button>
                                    `}
                            </div>
                            ${isEditingProfileDetails
                                ? `
                                    <form class="profile-details__form" id="profile-details-form">
                                        <label class="profile-details__field">
                                            <span>Name</span>
                                            <input class="profile-details__input" id="profile-name-input" type="text" maxlength="60" value="${safeName}" required>
                                        </label>
                                        <label class="profile-details__field">
                                            <span>Phone</span>
                                            <input class="profile-details__input" id="profile-phone-input" type="text" maxlength="30" value="${safePhone}">
                                        </label>
                                        <label class="profile-details__field">
                                            <span>Email</span>
                                            <input class="profile-details__input" id="profile-email-input" type="email" maxlength="80" value="${safeEmail}">
                                        </label>
                                        <label class="profile-details__field">
                                            <span>Bio</span>
                                            <textarea
                                                class="profile-details__input profile-details__textarea"
                                                id="profile-bio-input"
                                                maxlength="220"
                                                rows="4"
                                                placeholder="Write a short bio"
                                            >${safeBio}</textarea>
                                        </label>
                                        <div class="profile-details__actions">
                                            <button class="profile-details__cancel" type="button">Cancel</button>
                                            <button class="profile-details__save" type="submit">Save</button>
                                        </div>
                                    </form>
                                `
                                : `
                                    <h1 class="profile-name">${safeName}</h1>
                                    <p class="profile-contact">
                                        ${safePhone} | ${safeEmail}
                                    </p>
                                    <p class="profile-bio__text">${safeBio}</p>
                                `}
                        </div>
                    </div>
                `;

                const profilePhotoInput = document.getElementById('profile-photo-input');
                const profileDetailsEditBtn = document.querySelector('.profile-details__edit');
                const profileDetailsForm = document.getElementById('profile-details-form');
                const profileDetailsCancelBtn = document.querySelector('.profile-details__cancel');
                const profileNameInput = document.getElementById('profile-name-input');
                if (profilePhotoInput) {
                    profilePhotoInput.addEventListener('change', handleProfilePhotoSelection);
                }

                if (profileDetailsEditBtn) {
                    profileDetailsEditBtn.addEventListener('click', openProfileDetailsEditor);
                }

                if (profileDetailsForm) {
                    profileDetailsForm.addEventListener('submit', handleProfileDetailsSubmit);
                }

                if (profileDetailsCancelBtn) {
                    profileDetailsCancelBtn.addEventListener('click', closeProfileDetailsEditor);
                }
                const profileBioInput = document.getElementById('profile-bio-input');

                if (profileNameInput) {
                    profileNameInput.focus();
                    profileNameInput.select();
                } else if (profileBioInput) {
                    profileBioInput.focus();
                    profileBioInput.setSelectionRange(profileBioInput.value.length, profileBioInput.value.length);
                }
            }

            function handleProfilePhotoSelection(event) {
                const [file] = Array.from(event.target.files || []);

                if (!file) {
                    return;
                }

                if (!file.type.startsWith('image/')) {
                    event.target.value = '';
                    return;
                }

                const reader = new FileReader();

                reader.addEventListener('load', () => {
                    profileData.photo = reader.result;
                    renderProfile();
                });

                reader.readAsDataURL(file);
                event.target.value = '';
            }

            function openProfileDetailsEditor() {
                isEditingProfileDetails = true;
                renderProfile();
            }

            function closeProfileDetailsEditor() {
                isEditingProfileDetails = false;
                renderProfile();
            }

            function handleProfileDetailsSubmit(event) {
                event.preventDefault();

                const profileNameInput = document.getElementById('profile-name-input');
                const profilePhoneInput = document.getElementById('profile-phone-input');
                const profileEmailInput = document.getElementById('profile-email-input');
                const profileBioInput = document.getElementById('profile-bio-input');

                if (!profileNameInput || !profilePhoneInput || !profileEmailInput || !profileBioInput) {
                    return;
                }

                const nextName = profileNameInput.value.trim() || 'Jane Doe';
                const nextPhone = profilePhoneInput.value.trim() || '555-123-4567';
                const nextEmail = profileEmailInput.value.trim() || 'janedoe@janedoe.com';
                const nextBio = profileBioInput.value.trim();

                profileData.name = nextName;
                profileData.phone = nextPhone;
                profileData.email = nextEmail;
                profileData.bio = nextBio;
                profileData.initials = getInitials(nextName);
                isEditingProfileDetails = false;
                renderProfile();
            }

            function renderAlbums() {
                const albumsHTML = albums.map(album => `
                    <div
                        class="album-card glass-container ${selectedAlbumIds.has(album.id) ? 'album-card--selected' : ''} ${isDeleteMode ? 'album-card--delete-mode' : ''}"
                        data-id="${album.id}"
                    >
                        <div class="album-title">${album.title}</div>
                        <div class="album-subtitle">${album.subtitle}</div>
                    </div>
                `).join('');

                albumsRoot.innerHTML = `
                    <section class="albums-section">
                        <div class="albums-inner glass-container">
                            <div class="albums-actions">
                                <button class="add-album-btn" type="button" aria-label="Add album">
                                    +
                                </button>
                                <button
                                    class="delete-albums-btn ${isDeleteMode ? 'delete-albums-btn--active' : ''}"
                                    type="button"
                                    aria-label="Delete selected albums"
                                    title="${isDeleteMode ? 'Delete selected albums' : 'Select albums to delete'}"
                                >
                                    -
                                </button>
                            </div>
                            <div class="albums-row">
                                ${albumsHTML}
                            </div>
                        </div>
                    </section>
                `;

                const addBtn = albumsRoot.querySelector('.add-album-btn');
                const deleteBtn = albumsRoot.querySelector('.delete-albums-btn');
                const albumCards = albumsRoot.querySelectorAll('.album-card');

                addBtn.addEventListener('click', handleAddAlbum);
                deleteBtn.addEventListener('click', handleDeleteAlbum);
                albumCards.forEach(card => {
                    card.addEventListener('click', handleAlbumCardClick);
                });
            }

            function handleAddAlbum() {
                const newNumber = albums.length + 1;
                albumForm.dataset.nextId = String(albums.length ? albums[albums.length - 1].id + 1 : 1);
                albumNameInput.value = `Album ${newNumber}`;
                albumDescriptionInput.value = 'Generic album';
                openAlbumModal();
            }

            function openAlbumModal() {
                albumModal.classList.add('album-modal--open');
                albumModal.setAttribute('aria-hidden', 'false');
                albumNameInput.focus();
                albumNameInput.select();
            }

            function closeAlbumModal() {
                albumModal.classList.remove('album-modal--open');
                albumModal.setAttribute('aria-hidden', 'true');
                albumForm.reset();
            }

            function handleAlbumFormSubmit(event) {
                event.preventDefault();

                const fallbackNumber = albums.length + 1;
                const title = albumNameInput.value.trim() || `Album ${fallbackNumber}`;
                const subtitle = albumDescriptionInput.value.trim() || 'Generic album';
                const nextId = parseInt(albumForm.dataset.nextId, 10);

                albums.push({
                    id: nextId,
                    title,
                    subtitle,
                    photos: []
                });

                closeAlbumModal();
                renderAlbums();
            }

            function handleToggleAlbumSelection() {
                if (!isDeleteMode) {
                    return;
                }

                const albumId = parseInt(this.getAttribute('data-id'), 10);
                selectedAlbumIds.clear();
                selectedAlbumIds.add(albumId);
                pendingDeleteAlbumId = albumId;
                openDeleteConfirmation();
                renderAlbums();
            }

            function handleAlbumCardClick() {
                if (isDeleteMode) {
                    handleToggleAlbumSelection.call(this);
                    return;
                }

                const albumId = parseInt(this.getAttribute('data-id'), 10);
                const album = albums.find(item => item.id === albumId);

                if (!album) {
                    return;
                }

                openAlbumView(album);
            }

            function handleDeleteAlbum() {
                if (!isDeleteMode) {
                    selectedAlbumIds.clear();
                    pendingDeleteAlbumId = null;
                    isDeleteMode = true;
                    renderAlbums();
                    return;
                }

                selectedAlbumIds.clear();
                pendingDeleteAlbumId = null;
                isDeleteMode = false;
                renderAlbums();
            }

            function openAlbumView(album) {
                currentAlbumId = album.id;
                albumViewTitle.textContent = album.title;
                albumViewDescription.textContent = album.subtitle;
                renderAlbumPhotos(album);
                albumViewModal.classList.add('album-view-modal--open');
                albumViewModal.setAttribute('aria-hidden', 'false');
            }

            function closeAlbumView() {
                currentAlbumId = null;
                closePhotoViewer();
                albumPhotoInput.value = '';
                albumViewModal.classList.remove('album-view-modal--open');
                albumViewModal.setAttribute('aria-hidden', 'true');
            }

            function handleSaveAlbum() {
                closeAlbumView();
            }

            function openDeleteConfirmation() {
                const album = albums.find(item => item.id === pendingDeleteAlbumId);

                if (!album) {
                    return;
                }

                deleteConfirmDescription.textContent = `"${album.title}" will be permanently deleted. This action cannot be undone.`;
                deleteConfirmModal.classList.add('delete-confirm-modal--open');
                deleteConfirmModal.setAttribute('aria-hidden', 'false');
            }

            function closeDeleteConfirmation() {
                deleteConfirmModal.classList.remove('delete-confirm-modal--open');
                deleteConfirmModal.setAttribute('aria-hidden', 'true');
                selectedAlbumIds.clear();
                pendingDeleteAlbumId = null;
                isDeleteMode = false;
                renderAlbums();
            }

            function confirmDeleteAlbums() {
                albums = albums.filter(album => album.id !== pendingDeleteAlbumId);
                selectedAlbumIds.clear();
                pendingDeleteAlbumId = null;
                isDeleteMode = false;
                closeDeleteConfirmation();
                renderAlbums();
            }

            function renderAlbumPhotos(album) {
                if (!album.photos.length) {
                    albumPhotoGallery.innerHTML = `
                        <div class="album-view-modal__empty-state">
                            <div class="album-view-modal__icon">${album.title.charAt(0).toUpperCase()}</div>
                            <p>No photos in this album yet.</p>
                        </div>
                    `;
                    return;
                }

                albumPhotoGallery.innerHTML = album.photos.map(photo => `
                    <article class="album-photo-card" data-photo-id="${photo.id}">
                        <button class="album-photo-card__preview" type="button" data-photo-id="${photo.id}" aria-label="View photo">
                            <img class="album-photo-card__image" src="${photo.src}" alt="${photo.name}">
                        </button>
                        <button class="album-photo-card__remove" type="button" data-photo-id="${photo.id}" aria-label="Remove photo">
                            Remove
                        </button>
                    </article>
                `).join('');

                albumPhotoGallery.querySelectorAll('.album-photo-card__preview').forEach(button => {
                    button.addEventListener('click', handleOpenPhotoViewer);
                });
                albumPhotoGallery.querySelectorAll('.album-photo-card__remove').forEach(button => {
                    button.addEventListener('click', handleRemovePhoto);
                });
            }

            function handleAlbumPhotoSelection(event) {
                const currentAlbum = albums.find(album => album.id === currentAlbumId);
                const files = Array.from(event.target.files || []);

                if (!currentAlbum || !files.length) {
                    return;
                }

                files.forEach(file => {
                    const reader = new FileReader();

                    reader.addEventListener('load', () => {
                        currentAlbum.photos.push({
                            id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
                            name: file.name,
                            src: reader.result
                        });

                        if (currentAlbumId === currentAlbum.id) {
                            renderAlbumPhotos(currentAlbum);
                        }
                    });

                    reader.readAsDataURL(file);
                });

                event.target.value = '';
            }

            function handleRemovePhoto() {
                const currentAlbum = albums.find(album => album.id === currentAlbumId);
                const photoId = this.getAttribute('data-photo-id');

                if (!currentAlbum) {
                    return;
                }

                currentAlbum.photos = currentAlbum.photos.filter(photo => photo.id !== photoId);
                if (photoViewerModal.classList.contains('photo-viewer-modal--open')) {
                    closePhotoViewer();
                }
                renderAlbumPhotos(currentAlbum);
            }

            function handleOpenPhotoViewer() {
                const currentAlbum = albums.find(album => album.id === currentAlbumId);
                const photoId = this.getAttribute('data-photo-id');

                if (!currentAlbum) {
                    return;
                }

                currentPhotoIndex = currentAlbum.photos.findIndex(photo => photo.id === photoId);
                if (currentPhotoIndex < 0) {
                    return;
                }

                renderPhotoViewer(currentAlbum);
                photoViewerModal.classList.add('photo-viewer-modal--open');
                photoViewerModal.setAttribute('aria-hidden', 'false');
            }

            function renderPhotoViewer(album) {
                if (!album.photos.length) {
                    return;
                }

                const normalizedIndex = (currentPhotoIndex + album.photos.length) % album.photos.length;
                const photo = album.photos[normalizedIndex];
                currentPhotoIndex = normalizedIndex;

                photoViewerImage.src = photo.src;
                photoViewerImage.alt = photo.name;
                photoViewerTitle.textContent = photo.name;
            }

            function closePhotoViewer() {
                photoViewerModal.classList.remove('photo-viewer-modal--open');
                photoViewerModal.setAttribute('aria-hidden', 'true');
                photoViewerImage.src = '';
                photoViewerImage.alt = '';
                photoViewerTitle.textContent = '';
            }

            function showPreviousPhoto() {
                const currentAlbum = albums.find(album => album.id === currentAlbumId);
                if (!currentAlbum || !currentAlbum.photos.length) {
                    return;
                }

                currentPhotoIndex -= 1;
                renderPhotoViewer(currentAlbum);
            }

            function showNextPhoto() {
                const currentAlbum = albums.find(album => album.id === currentAlbumId);
                if (!currentAlbum || !currentAlbum.photos.length) {
                    return;
                }

                currentPhotoIndex += 1;
                renderPhotoViewer(currentAlbum);
            }

            // Initial render
            albumForm.addEventListener('submit', handleAlbumFormSubmit);
            albumModalCloseBtn.addEventListener('click', closeAlbumModal);
            albumModalCancelBtn.addEventListener('click', closeAlbumModal);
            albumModal.addEventListener('click', (event) => {
                if (event.target.classList.contains('album-modal') || event.target.classList.contains('album-modal__backdrop')) {
                    closeAlbumModal();
                }
            });
            albumViewCloseBtn.addEventListener('click', closeAlbumView);
            albumPhotoInput.addEventListener('change', handleAlbumPhotoSelection);
            albumSaveBtn.addEventListener('click', handleSaveAlbum);
            photoViewerCloseBtn.addEventListener('click', closePhotoViewer);
            photoViewerPrevBtn.addEventListener('click', showPreviousPhoto);
            photoViewerNextBtn.addEventListener('click', showNextPhoto);
            deleteConfirmCloseBtn.addEventListener('click', closeDeleteConfirmation);
            deleteConfirmCancelBtn.addEventListener('click', closeDeleteConfirmation);
            deleteConfirmSubmitBtn.addEventListener('click', confirmDeleteAlbums);
            albumViewModal.addEventListener('click', (event) => {
                if (event.target.classList.contains('album-view-modal') || event.target.classList.contains('album-view-modal__backdrop')) {
                    closeAlbumView();
                }
            });
            photoViewerModal.addEventListener('click', (event) => {
                if (event.target.classList.contains('photo-viewer-modal') || event.target.classList.contains('photo-viewer-modal__backdrop')) {
                    closePhotoViewer();
                }
            });
            deleteConfirmModal.addEventListener('click', (event) => {
                if (event.target.classList.contains('delete-confirm-modal') || event.target.classList.contains('delete-confirm-modal__backdrop')) {
                    closeDeleteConfirmation();
                }
            });
            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape' && albumModal.classList.contains('album-modal--open')) {
                    closeAlbumModal();
                }

                if (event.key === 'Escape' && albumViewModal.classList.contains('album-view-modal--open')) {
                    closeAlbumView();
                }

                if (event.key === 'Escape' && photoViewerModal.classList.contains('photo-viewer-modal--open')) {
                    closePhotoViewer();
                }

                if (event.key === 'ArrowLeft' && photoViewerModal.classList.contains('photo-viewer-modal--open')) {
                    showPreviousPhoto();
                }

                if (event.key === 'ArrowRight' && photoViewerModal.classList.contains('photo-viewer-modal--open')) {
                    showNextPhoto();
                }

                if (event.key === 'Escape' && deleteConfirmModal.classList.contains('delete-confirm-modal--open')) {
                    closeDeleteConfirmation();
                }
            });

            renderProfile();
            renderAlbums();
        });
    </script>
</body>
</html>
